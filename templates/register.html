{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow border-0">
        <div class="card-body p-4">
          <h4 class="card-title text-center mb-4"><i class="bi bi-person-plus"></i> Create Account</h4>
          <form method="POST" action="{{ url_for('recruiter.register') }}">
            <div class="mb-3"><label class="form-label">Full Name</label>
              <input type="text" name="name" class="form-control" required></div>
            <div class="mb-3"><label class="form-label">Email</label>
              <input type="email" name="email" class="form-control" required></div>
            <div class="mb-3"><label class="form-label">Password</label>
              <input type="password" name="password" class="form-control" required></div>
            <button type="submit" class="btn btn-primary w-100">Register</button>
          </form>
          <hr><p class="text-center small">Have an account? <a href="{{ url_for('recruiter.login') }}">Login</a></p>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
