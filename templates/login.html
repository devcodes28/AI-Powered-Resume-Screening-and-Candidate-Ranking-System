{% extends "base.html" %}
{% block content %}
<div class="flex-grow flex items-center justify-center py-12">
    <div class="w-full max-w-sm bg-panel border border-border rounded-xl shadow-2xl p-8">
        
        <div class="text-center mb-8">
            <h2 class="text-2xl font-semibold tracking-tight text-brand">Welcome back</h2>
            <p class="text-sm text-muted mt-2">Enter your credentials to access the console</p>
        </div>

        <form method="POST" action="{{ url_for('recruiter.login') }}" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-brand mb-1.5">Email address</label>
                <input type="email" name="email" required class="w-full bg-base border border-border rounded-lg px-4 py-2.5 text-brand text-sm focus:outline-none focus:ring-2 focus:ring-zinc-600 focus:border-transparent transition-all placeholder-zinc-600" placeholder="name@company.com">
            </div>
            
            <div>
                <div class="flex items-center justify-between mb-1.5">
                    <label class="block text-sm font-medium text-brand">Password</label>
                    <a href="{{ url_for('recruiter.forgot_password') }}" class="text-xs text-muted hover:text-brand transition-colors">Forgot password?</a>
                </div>
                <input type="password" name="password" required class="w-full bg-base border border-border rounded-lg px-4 py-2.5 text-brand text-sm focus:outline-none focus:ring-2 focus:ring-zinc-600 focus:border-transparent transition-all" placeholder="••••••••">
            </div>

            <button type="submit" class="w-full bg-white text-black font-bold py-3 rounded-lg hover:bg-zinc-200 transition-all">
                Sign In
            </button>
        </form>

        <p class="text-center text-sm text-muted mt-8">
            Don't have an account? <a href="{{ url_for('recruiter.register') }}" class="text-brand hover:underline underline-offset-4">Register here</a>
        </p>
    </div>
</div>
{% endblock %}
