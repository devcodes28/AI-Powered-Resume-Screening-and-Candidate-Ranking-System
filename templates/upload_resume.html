{% extends "base.html" %}
{% block title %}Upload Resumes{% endblock %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-7">
      <div class="card shadow border-0">
        <div class="card-body p-4">
          <h4 class="mb-1"><i class="bi bi-cloud-upload"></i> Upload Resumes</h4>
          <p class="text-muted mb-4">Job: <strong>{{ job.title }}</strong> @ {{ job.company }}</p>
          <form method="POST" enctype="multipart/form-data"
                action="{{ url_for('candidate.upload_resume', job_id=job.job_id) }}">
            <div class="mb-4">
              <label class="form-label fw-semibold">Select Resume Files (PDF / DOCX)</label>
              <input type="file" name="resumes" class="form-control" multiple
                     accept=".pdf,.docx" id="resumeInput" required>
              <div class="form-text">You can select multiple files at once.</div>
            </div>
            <div id="nameFields"></div>
            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-success"><i class="bi bi-upload"></i> Upload &amp; Extract</button>
              <a href="{{ url_for('recruiter.dashboard') }}" class="btn btn-outline-secondary">Back</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
// Dynamically add candidate name fields for each selected file
document.getElementById('resumeInput').addEventListener('change', function() {
  const container = document.getElementById('nameFields');
  container.innerHTML = '';
  Array.from(this.files).forEach(file => {
    container.innerHTML += `
      <div class="mb-3">
        <label class="form-label">Candidate Name for <em>${file.name}</em></label>
        <input type="text" name="name_${file.name}" class="form-control"
               placeholder="Full name (leave blank to use filename)">
      </div>`;
  });
});
</script>
{% endblock %}
