{% extends "base.html" %}
{% block content %}
<div class="container mx-auto my-5" style="max-width: 600px;">
    <div class="card border-0 shadow-lg bg-white rounded-4 overflow-hidden">
        <div class="card-header bg-dark text-white py-3">
            <h5 class="mb-0 fw-bold">➕ Register Candidate to Pipeline</h5>
        </div>
        <div class="card-body p-4">
            <div class="mb-4 bg-light p-3 rounded border">
                <p class="mb-0 text-muted small">Targeting Job Profile:</p>
                <h5 class="fw-bold text-primary mb-0">{{ job.title }}</h5>
            </div>
            
            <form action="{{ url_for('candidate.add_candidate', job_id=job.job_id) }}" method="POST" enctype="multipart/form-data">
                
                <div class="row g-3 mb-3">
                    <div class="col-md-12">
                        <label class="form-label fw-bold text-secondary">Full Name <span class="text-danger">*</span></label>
                        <input type="text" name="name" class="form-control" placeholder="e.g. Jane Doe" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold text-secondary">Email Address</label>
                        <input type="email" name="email" class="form-control" placeholder="jane@example.com">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold text-secondary">Phone Number</label>
                        <input type="text" name="phone" class="form-control" placeholder="555-0199">
                    </div>
                </div>

                <hr class="my-4">

                <div class="mb-4">
                    <label class="form-label fw-bold text-secondary">Upload Resume Document <span class="text-danger">*</span></label>
                    <input type="file" name="resume" class="form-control border-2" accept=".pdf,.docx,.txt" required>
                    <small class="text-muted mt-1 d-block">Supported formats: PDF, DOCX, TXT</small>
                </div>
                
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary btn-lg fw-bold">Save Candidate & Run AI Score ⚡</button>
                    <a href="{{ url_for('candidate.rank_candidates_view', job_id=job.job_id) }}" class="btn btn-light text-muted">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
