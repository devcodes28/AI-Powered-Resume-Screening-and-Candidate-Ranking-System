{% extends "base.html" %}
{% block content %}
<div class="py-8 max-w-xl mx-auto w-full">
    
    <div class="bg-panel border border-border rounded-xl shadow-sm overflow-hidden">
        <div class="px-6 py-4 border-b border-border bg-base/50">
            <h5 class="font-semibold text-brand">Register Candidate to Pipeline</h5>
        </div>
        
        <div class="p-6">
            <div class="mb-6 bg-zinc-900/50 border border-border p-4 rounded-lg">
                <p class="text-xs text-muted uppercase tracking-wider mb-1">Targeting Profile</p>
                <h5 class="font-bold text-brand">{{ job.title }}</h5>
            </div>
            
            <form action="{{ url_for('candidate.add_candidate', job_id=job.job_id) }}" method="POST" enctype="multipart/form-data" class="space-y-5">
                
                <div>
                    <label class="block text-sm font-medium text-brand mb-1.5">Full Name <span class="text-red-500">*</span></label>
                    <input type="text" name="name" required class="w-full bg-base border border-border rounded-lg px-4 py-2.5 text-brand text-sm focus:outline-none focus:ring-2 focus:ring-zinc-600 transition-all placeholder-zinc-600" placeholder="e.g. Jane Doe">
                </div>
                
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                    <div>
                        <label class="block text-sm font-medium text-brand mb-1.5">Email Address</label>
                        <input type="email" name="email" class="w-full bg-base border border-border rounded-lg px-4 py-2.5 text-brand text-sm focus:outline-none focus:ring-2 focus:ring-zinc-600 transition-all placeholder-zinc-600" placeholder="jane@example.com">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-brand mb-1.5">Phone Number</label>
                        <input type="text" name="phone" class="w-full bg-base border border-border rounded-lg px-4 py-2.5 text-brand text-sm focus:outline-none focus:ring-2 focus:ring-zinc-600 transition-all placeholder-zinc-600" placeholder="555-0199">
                    </div>
                </div>

                <hr class="border-border my-6">

                <div>
                    <label class="block text-sm font-medium text-brand mb-1.5">Upload Resume Document <span class="text-red-500">*</span></label>
                    
                    <input type="file" name="resume" required accept=".pdf,.docx,.txt" 
                        class="block w-full text-sm text-muted
                        file:mr-4 file:py-2.5 file:px-4
                        file:rounded-lg file:border-0
                        file:text-sm file:font-semibold
                        file:bg-zinc-800 file:text-brand
                        hover:file:bg-zinc-700
                        border border-dashed border-zinc-700 rounded-lg p-2 bg-base/50
                        transition-all cursor-pointer">
                    <p class="text-xs text-muted mt-2">Supported formats: PDF, DOCX, TXT</p>
                </div>
                
                <div class="pt-4 flex flex-col sm:flex-row gap-3">
                    <button type="submit" class="flex-1 bg-brand text-black font-medium py-2.5 rounded-lg text-sm hover:bg-zinc-200 transition-colors">
                        Save & Run AI Score ⚡
                    </button>
                    <a href="{{ url_for('candidate.rank_candidates_view', job_id=job.job_id) }}" class="sm:w-32 bg-zinc-800 text-brand font-medium py-2.5 rounded-lg text-sm hover:bg-zinc-700 transition-colors border border-zinc-700 text-center">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
