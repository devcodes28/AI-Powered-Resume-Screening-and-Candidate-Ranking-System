{% extends "base.html" %}
{% block content %}
<div class="card border-0 shadow-sm max-width-form mx-auto p-4">
    <h3 class="fw-bold mb-3 text-dark">Publish New Job Specification</h3>
    <form action="{{ url_for('recruiter.add_job') }}" method="POST">
        <div class="mb-3">
            <label class="form-label fw-bold">Job Title</label>
            <input type="text" name="title" class="form-control" placeholder="e.g., Senior Full-Stack Developer" required>
        </div>
        <div class="mb-3">
            <label class="form-label fw-bold">Company Name</label>
            <input type="text" name="company" class="form-control" placeholder="e.g., Shakti Enterprise AI" required>
        </div>
        <div class="mb-3">
            <label class="form-label fw-bold">Required Experience Target Matrix</label>
            <input type="text" name="experience_required" class="form-control" placeholder="e.g., 3-5 Years" required>
        </div>
        <div class="mb-3">
            <label class="form-label fw-bold">Key Core Skills (Comma Separated)</label>
            <input type="text" name="required_skills" class="form-control" placeholder="Python, Flask, PostgreSQL, PyTorch" required>
        </div>
        <div class="mb-3">
            <label class="form-label fw-bold">Comprehensive Job Description Context</label>
            <textarea name="description" class="form-control" rows="6" placeholder="Provide complete technical expectations..." required></textarea>
        </div>
        <button type="submit" class="btn btn-primary px-4">Commit to Database</button>
    </form>
</div>
{% endblock %}
